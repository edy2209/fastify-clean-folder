version: '3.8'
services:
    app:
        build:
            context:
            ports:
                - "3000:3000"
            environment:
                - PORT=3000
    mongo:
        image: mongo:latest
        container_name: mongo
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db
volumes:
    mongo_data: